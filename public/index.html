<!DOCTYPE html>
  <html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iStudio iTalent - AI Generator</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
            font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
}
    .container {
            background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 700px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
    h1 {
            text-align: center;
      color: #333;
      margin-bottom: 8px;
      font-size: 2rem;
}
    .subtitle {
            text-align: center;
      color: #888;
      margin-bottom: 32px;
      font-size: 0.9rem;
}
    textarea {
            width: 100%;
      height: 150px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px;
      font-size: 1rem;
      resize: vertical;
      transition: border-color 0.2s;
}
    textarea:focus {
            outline: none;
      border-color: #667eea;
}
    button {
            width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 16px;
      transition: opacity 0.2s;
}
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .result {
            margin-top: 24px;
      padding: 20px;
      background: #f8f9fa;
            border-radius: 8px;
      border-left: 4px solid #667eea;
      display: none;
}
    .result h3 { color: #555; margin-bottom: 12px; }
    .result p { color: #333; line-height: 1.6; white-space: pre-wrap; }
    .loading { text-align: center; color: #667eea; margin-top: 16px; display: none; }
  </style>
    </head>
    <body>
      <div class="container">
        <h1>iStudio iTalent</h1>
        <p class="subtitle">Powered by Claude AI</p>
    <textarea id="prompt" placeholder="Digite seu prompt aqui..."></textarea>
    <button onclick="generate()" id="btn">Gerar com IA</button>
        <div class="loading" id="loading">Gerando...</div>
        <div class="result" id="result">
          <h3>Resposta:</h3>
          <p id="resultText"></p>
        </div>
      </div>
      <script>
        async function generate() {
          const prompt = document.getElementById('prompt').value;
      if (!prompt.trim()) { alert('Digite um prompt!'); return; }
      const btn = document.getElementById('btn');
      const loading = document.getElementById('loading');
      const result = document.getElementById('result');
      btn.disabled = true;
      loading.style.display = 'block';
      result.style.display = 'none';
      try {
        const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
          });
        const data = await res.json();
        document.getElementById('resultText').textContent = data.result || data.error;
        result.style.display = 'block';
} catch (e) {
        alert('Erro ao conectar com a API.');
} finally {
        btn.disabled = false;
        loading.style.display = 'none';
}
}
  </script>
</body>
</html>
